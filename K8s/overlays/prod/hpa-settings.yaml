apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tb-platform-hpa
spec:
  minReplicas: 5
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85