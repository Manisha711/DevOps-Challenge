apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tb-platform-prod
commonLabels:
  env: prod

resources:
- ../../base
- namespace.yaml

patches:
- path: replica-count.yaml
- path: resource-limits.yaml
- path: hpa-settings.yaml

configMapGenerator:
- name: tb-platform-config
  behavior: merge
  literals:
  - ENVIRONMENT=production