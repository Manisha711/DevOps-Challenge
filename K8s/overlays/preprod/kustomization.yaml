apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tb-platform-preprod
commonLabels:
  env: preprod

resources:
- ../../base
- namespace.yaml

patches:
- path: replica-count.yaml
- path: resource-limits.yaml

configMapGenerator:
- name: tb-platform-config
  behavior: merge
  literals:
  - ENVIRONMENT=preprod