apiVersion: apps/v1
kind: Deployment
metadata:
  name: tb-platform
  labels:
    app: tb-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tb-platform
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tb-platform
    spec:
      containers:
        - name: tb-platform
          image: tb-platform:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8888
          envFrom:
            - secretRef:
                name: tb-platform-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
---
apiVersion: v1
kind: Service
metadata:
  name: tb-platform-service
  labels:
    app: tb-platform
spec:
  type: NodePort
  selector:
    app: tb-platform
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8888